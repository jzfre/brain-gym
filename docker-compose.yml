services:
  db:
    image: pgvector/pgvector:pg16
    container_name: brain_gym_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: brain_gym
    ports:
      # Bind to loopback only — host dev can still connect via 127.0.0.1:5438,
      # but the DB is never exposed to the public network interface.
      - "127.0.0.1:5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d brain_gym"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: brain_gym_app
    restart: unless-stopped
    env_file: .env
    environment:
      # Override .env's host-dev DATABASE_URL with the in-network address.
      # Same .env file works for `pnpm dev` (5438) and `docker compose up` (db:5432).
      DATABASE_URL: "postgresql://brain:brain@db:5432/brain_gym?schema=public"
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3111}:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
