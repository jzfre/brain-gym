services:
  db:
    image: postgres:16-alpine
    container_name: brain_gym_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: brain_gym
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d brain_gym"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
